<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — Shopwell</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/index.html" class="logo">Shop<span>well</span></a>
    <nav class="nav-links">
      <a href="/index.html">Shop</a>
      <a href="/orders.html">My Orders</a>
      <a href="/cart.html" class="cart-link">Cart<span id="cart-badge" class="cart-badge hidden">0</span></a>
      <span id="auth-area"></span>
    </nav>
  </div>
</header>

<main>
  <form id="register-form" class="form-card">
    <h1>Create an account</h1>
    <div id="msg" class="error-msg"></div>
    <div class="field">
      <label for="name">Full name</label>
      <input type="text" id="name" required autocomplete="name">
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" required autocomplete="email">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" required minlength="6" autocomplete="new-password">
    </div>
    <button type="submit" class="btn btn-primary btn-block">Sign up</button>
    <p class="form-footer">Already have an account? <a href="/login.html">Log in</a></p>
  </form>
</main>

<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
